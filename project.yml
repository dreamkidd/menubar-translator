name: MenubarTranslator
options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 5.10
    MACOSX_DEPLOYMENT_TARGET: 14.0
    PRODUCT_BUNDLE_IDENTIFIER: com.dreamkidd.menubar-translator
    PRODUCT_NAME: MenubarTranslator
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    GENERATE_INFOPLIST_FILE: NO
targets:
  MenubarTranslator:
    type: application
    platform: macOS
    sources:
      - path: app/Sources
    resources:
      - path: app/Resources
    settings:
      base:
        INFOPLIST_FILE: app/Resources/Info.plist
